version: "3"
services:
  mailcow-aliases:
    image: ghcr.io/frog158/pymailcowaliasesbot:latest
    container_name: tg-mailcow-aliases
    env_file:
      - .env
    environment:
      - DB_PATH=/data/user.db
    restart: always

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    volumes:
      - ${PWD}/data:/data
